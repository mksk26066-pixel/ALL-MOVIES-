<!DOCTYPE html>
<html lang="en" style="height: 100%; margin: 0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - VidBunker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { indigo: { 500: '#6366F1', 600: '#4F46E5' } } } }
        }
    </script>
    <style>
        body { margin: 0; min-height: 100vh; background-color: #050505; color: #f1f5f9; }
    </style>
</head>
<body class="flex flex-col h-full bg-[#050505] text-slate-100 font-sans pb-20">

    <div class="px-6 py-4 flex justify-between items-center bg-[#0A0A0A] border-b border-white/5 sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold tracking-tight text-white">Vid<span class="text-indigo-500">Bunker</span> <span class="text-slate-500 font-normal">Command</span></h1>
        </div>
    </div>

    <div class="px-4 py-8 max-w-3xl mx-auto w-full">
        <h2 class="text-2xl font-bold mb-6 tracking-tight text-white">Deploy Node</h2>

        <div class="bg-[#111111] border border-white/5 rounded-3xl p-6 shadow-2xl">
            <form id="uploadForm" class="flex flex-col gap-5">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-2">Operation Title</label>
                    <input type="text" id="vTitle" required class="w-full bg-[#050505] border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="e.g. Project Demo">
                </div>
                
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-2">Mission Briefing (Desc)</label>
                    <textarea id="vDesc" required rows="3" class="w-full bg-[#050505] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="Confidential details..."></textarea>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-2">Video Payload URL</label>
                        <input type="url" id="vUrl" required class="w-full bg-[#050505] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="https://...mp4">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-2">Covert Thumbnail URL</label>
                        <input type="url" id="vThumb" required class="w-full bg-[#050505] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="https://...jpg">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-2">Length</label>
                    <input type="text" id="vDuration" required class="w-32 bg-[#050505] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="04:20">
                </div>

                <div class="pt-6 mt-2 border-t border-white/5">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] transition-all text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-500/20 uppercase tracking-wider text-xs">
                        Execute Deployment
                    </button>
                    <p id="msg" class="text-emerald-500 text-xs font-mono mt-4 text-center hidden">> Deployment successful. Node active.</p>
                </div>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 h-16 bg-[#0A0A0A] border-t border-white/5 flex items-center justify-around px-6 z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-medium">Vault</span>
        </a>
        <a href="admin.html" class="flex flex-col items-center gap-1 text-indigo-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13a1 1 0 102 0V9.414l1.293 1.293a1 1 0 001.414-1.414z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] font-medium">Command</span>
        </a>
    </div>

    <script src="assets/js/db.js"></script>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const video = {
                title: document.getElementById('vTitle').value,
                description: document.getElementById('vDesc').value,
                videoUrl: document.getElementById('vUrl').value,
                thumbnailUrl: document.getElementById('vThumb').value,
                duration: document.getElementById('vDuration').value
            };
            
            addVideo(video);
            
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
            e.target.reset();
        });
    </script>
</body>
</html>
